<main class="min-h-screen bg-gray-50">
  <app-hero />

  <section id="outages" class="mx-auto max-w-6xl px-6 py-12">
    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <h2 class="text-2xl font-bold text-gray-900">Cortes por barrio</h2>
      <app-date-filter
        [selectedMonth]="selectedMonth()"
        [selectedYear]="selectedYear()"
        (filterChange)="onFilterChange($event)"
      />
    </div>

    @if (neighborhoods().length === 0) {
      <p class="rounded-xl bg-white p-6 text-center text-gray-600 shadow-sm">
        No hay datos de cortes disponibles.
      </p>
    } @else if (filteredOutages().length === 0) {
      <p class="rounded-xl bg-white p-6 text-center text-gray-600 shadow-sm">
        No hay cortes para este período.
      </p>
    } @else {
      <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
        @for (neighborhood of neighborhoods(); track neighborhood.id) {
          <app-outage-card [neighborhood]="neighborhood" [isFilterActive]="true" />
        }
      </div>
    }
  </section>

  <section class="mx-auto max-w-6xl px-6 pb-12">
    <app-video-carousel [testimonials]="videoTestimonials()" />
  </section>

  <app-footer />
</main>
