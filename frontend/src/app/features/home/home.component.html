<main class="min-h-screen bg-gray-50">
  <app-hero />
  <app-context-section />

  <div id="en-directo">
    <app-live-section [liveGroups]="liveGroups()" />
  </div>

  <section id="grafico-anual" class="bg-white py-20">
    <div class="mx-auto max-w-6xl px-6">
      <app-chart-section
        [districts]="districts()"
        [yearlyOutages]="yearlyOutages()" />

      <app-monthly-section
        [districts]="districts()"
        [monthlyOutages]="monthlyOutages()"
        [selectedMonth]="selectedMonth()"
        [selectedYear]="selectedYear()"
        (filterChange)="onFilterChange($event)" />
    </div>
  </section>

  <section class="bg-gray-50 py-16">
    <div class="mx-auto max-w-6xl px-6">
      <app-video-carousel />
    </div>
  </section>

  <app-donation-section />

  <app-footer />
</main>
