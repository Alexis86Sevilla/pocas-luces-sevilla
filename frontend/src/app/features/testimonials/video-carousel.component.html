<section aria-labelledby="testimonials-heading" class="relative">
  <div class="mb-6 flex items-end justify-between gap-4">
    <div>
      <span class="mb-2 inline-block rounded-full bg-gray-200 px-3 py-1 text-xs font-semibold uppercase tracking-widest text-gray-500">Testimonios</span>
      <h2 id="testimonials-heading" class="text-2xl font-bold text-gray-900 sm:text-3xl">
        Lo que dicen los vecinos y los medios
      </h2>
    </div>

    <div class="hidden gap-2 sm:flex">
      <button
        type="button"
        class="rounded-full border border-gray-300 bg-white p-2.5 text-gray-700 shadow-sm transition hover:bg-gray-900 hover:text-white disabled:cursor-not-allowed disabled:opacity-30"
        [disabled]="!canScrollLeft()"
        (click)="scrollLeft()"
        aria-label="Anterior">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <button
        type="button"
        class="rounded-full border border-gray-300 bg-white p-2.5 text-gray-700 shadow-sm transition hover:bg-gray-900 hover:text-white disabled:cursor-not-allowed disabled:opacity-30"
        [disabled]="!canScrollRight()"
        (click)="scrollRight()"
        aria-label="Siguiente">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>
  </div>

  @if (testimonials().length === 0) {
    <p class="rounded-xl bg-white p-6 text-center text-gray-600 shadow-sm">
      Aún no hay testimonios disponibles.
    </p>
  } @else {
    <div class="relative">
      <div
        #scrollContainer
        class="flex snap-x snap-mandatory gap-5 overflow-x-auto pb-6 scrollbar-hide"
        (scroll)="onScroll()">
        @for (video of testimonials(); track video.id) {
          <div class="w-[85vw] shrink-0 snap-start sm:w-[400px]">
            <app-video-card [video]="video" />
          </div>
        }
      </div>

      <!-- Gradient hints -->
      <div class="pointer-events-none absolute inset-y-0 left-0 w-8 bg-gradient-to-r from-gray-50 to-transparent" [class.opacity-0]="!canScrollLeft()"></div>
      <div class="pointer-events-none absolute inset-y-0 right-0 w-8 bg-gradient-to-l from-gray-50 to-transparent" [class.opacity-0]="!canScrollRight()"></div>
    </div>

    <p class="mt-2 text-center text-sm text-gray-400 sm:hidden">Desliza para ver más</p>
  }
</section>
