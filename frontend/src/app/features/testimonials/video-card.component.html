<article class="w-full">
  <div class="relative aspect-video w-full overflow-hidden rounded-2xl bg-black shadow-md">
    <iframe
      [src]="safeUrl()"
      title="Testimonio de {{ video().authorName }}"
      class="absolute inset-0 h-full w-full border-0"
      allowfullscreen
      loading="lazy"
    ></iframe>
  </div>

  <p class="mt-3 text-center text-sm font-semibold text-gray-900">
    {{ video().authorName }}
  </p>
</article>
