<article class="w-full">
  <div class="relative aspect-video w-full overflow-hidden rounded-2xl bg-black shadow-md">
    @if (isYouTube()) {
      <iframe
        [src]="safeUrl()"
        title="{{ video().authorName }}"
        class="absolute inset-0 h-full w-full border-0"
        allowfullscreen
        loading="lazy"
      ></iframe>
    } @else {
      <a [href]="video().embedUrl" target="_blank" rel="noopener noreferrer"
         class="flex h-full w-full flex-col items-center justify-center bg-gradient-to-br from-purple-600 to-pink-600 p-6 text-center text-white transition hover:opacity-90">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        <span class="text-sm font-semibold">Ver en Instagram</span>
        <span class="mt-1 line-clamp-2 text-xs opacity-90">{{ video().authorName }}</span>
      </a>
    }
  </div>

  <p class="mt-3 text-center text-sm font-semibold text-gray-900">
    {{ video().authorName }}
  </p>
</article>
