<article class="group rounded-2xl border border-gray-100 bg-white p-5 shadow-sm transition-shadow hover:shadow-md">
  <h3 class="mb-4 text-base font-bold text-gray-900">{{ neighborhood().name }}</h3>

  <div class="mb-4 grid grid-cols-2 gap-3">
    <div class="rounded-xl bg-amber-50 px-3 py-3 text-center">
      <span class="block text-xl font-extrabold text-amber-700">{{ average() }}</span>
      <span class="text-xs font-medium text-amber-600">min de media</span>
    </div>

    <div class="rounded-xl bg-red-50 px-3 py-3 text-center">
      <span class="block text-xl font-extrabold text-red-600">{{ count() }}</span>
      <span class="text-xs font-medium text-red-500">cortes</span>
    </div>
  </div>

  <button
    type="button"
    class="w-full rounded-lg bg-gray-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2"
    (click)="toggleExpanded()"
    [attr.aria-expanded]="expanded()"
  >
    {{ expanded() ? 'Ocultar historial' : 'Ver historial' }}
  </button>

  @if (expanded()) {
    <div class="mt-4 border-t border-gray-100 pt-4">
      @if (outages().length === 0) {
        <p class="text-sm text-gray-400">Sin cortes este mes.</p>
      } @else {
        <ul class="space-y-2">
          @for (outage of outages(); track outage.id) {
            <li class="flex items-center justify-between text-sm">
              <time class="text-gray-500" [attr.datetime]="outage.date.toISOString()">
                {{ outage.date | date: 'dd/MM' }}
              </time>
              <span class="rounded-full bg-gray-100 px-2.5 py-0.5 text-xs font-semibold text-gray-700">
                {{ outage.durationMinutes }} min
              </span>
            </li>
          }
        </ul>
      }
    </div>
  }
</article>
