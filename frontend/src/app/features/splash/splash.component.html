<section
  class="splash relative flex h-screen w-full items-center justify-center overflow-hidden"
  aria-live="polite"
>
  <img
    class="hero-image absolute inset-0 h-full w-full object-cover"
    [class.grayscale]="phase() === 'done'"
    src="https://placehold.co/800x600/374151/e5e7eb?text=Foto+del+alcalde"
    alt="Fotografía del alcalde"
  />

  <div
    class="blackout-overlay absolute inset-0 bg-black"
    [class.active]="phase() === 'blackout'"
    [class.done]="phase() === 'done'"
    aria-hidden="true"
  ></div>

  <div
    class="relative z-10 flex max-w-3xl flex-col items-center px-6 text-center text-white"
  >
    <h1 class="mb-6 text-4xl font-bold leading-tight drop-shadow-lg md:text-6xl">
      Un alcalde con pocas luces
    </h1>

    <p class="mb-8 text-lg drop-shadow-md md:text-2xl">
      Sevilla merece un servicio eléctrico digno para todos los barrios.
    </p>

    <button
      type="button"
      class="skip-button rounded-full bg-white px-6 py-3 font-semibold text-gray-900 shadow-lg transition hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-900"
      (click)="skip()"
    >
      Saltar
    </button>
  </div>
</section>
