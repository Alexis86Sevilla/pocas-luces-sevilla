<section
  class="hero relative flex min-h-screen flex-col items-center overflow-hidden bg-gray-900 animate"
  [class.dark]="isGrayscale()"
>
  <div
    class="mayor-photo absolute inset-0 bg-cover bg-center"
    style="background-image: url('alcalde-micro.png')"
    role="img"
    aria-label="Fotografía del alcalde"
  ></div>

  <div class="vignette absolute inset-0 z-10" aria-hidden="true"></div>

  <div class="hero-content relative z-20 mx-auto mb-20 mt-auto max-w-3xl px-6 text-center">


    <h1 class="mb-6 text-4xl font-extrabold leading-tight text-white md:text-6xl" style="text-shadow: 0 4px 24px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5)">
      Un alcalde con<br />pocas luces
    </h1>

    <p class="mb-10 text-lg leading-relaxed text-gray-100 md:text-xl" style="text-shadow: 0 2px 12px rgba(0,0,0,0.6)">
      Sacamos a la luz los cortes que la dejadez municipal esconde en los barrios humildes.
    </p>

    <div class="flex flex-col items-center gap-3 sm:flex-row sm:justify-center">
      <button type="button"
        class="inline-flex items-center gap-2 rounded-full bg-red-500 px-7 py-3 text-sm font-bold text-white cursor-pointer shadow-lg shadow-red-500/30 transition hover:bg-red-400 focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-2 focus:ring-offset-gray-900"
        (click)="scrollTo('en-directo')">
        <span class="relative flex h-2 w-2">
          <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-white opacity-75"></span>
          <span class="relative inline-flex h-2 w-2 rounded-full bg-white"></span>
        </span>
        En directo
      </button>
      <button type="button"
        class="inline-flex items-center gap-2 rounded-full bg-amber-400 px-7 py-3 text-sm font-bold text-gray-900 cursor-pointer shadow-lg shadow-amber-400/30 transition hover:bg-amber-300 hover:shadow-amber-400/50 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-gray-900"
        (click)="scrollTo('grafico-anual')">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>
        Gráfico anual
      </button>
      <button type="button"
        class="inline-flex items-center gap-2 rounded-full bg-white/10 px-7 py-3 text-sm font-bold text-white cursor-pointer backdrop-blur-sm transition hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-900"
        (click)="scrollTo('cortes-mensuales')">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="6" stroke-width="2"/><line x1="8" y1="2" x2="8" y2="6" stroke-width="2"/><line x1="3" y1="10" x2="21" y2="10" stroke-width="2"/></svg>
        Cortes mensuales
      </button>
    </div>
  </div>

  <span class="absolute bottom-3 right-4 z-20 select-none text-xs font-light text-white/30">
    María José López / Europa Press
  </span>
</section>
