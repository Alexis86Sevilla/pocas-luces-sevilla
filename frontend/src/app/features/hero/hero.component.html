<section
  class="hero relative flex min-h-screen flex-col items-center overflow-hidden bg-gray-900"
  [class.animate]="animate"
  [class.dark]="isGrayscale()"
>
  <img
    class="mayor-photo absolute inset-0 h-full w-full object-cover"
    src="alcalde-micro.png"
    alt="Fotografía del alcalde"
  />

  <p class="mt-6 inline-block rounded-full border border-amber-400/30 bg-amber-400/10 px-5 py-2 text-sm font-bold uppercase tracking-[0.25em] text-amber-300 backdrop-blur-sm">
      Sevilla
  </p>

  <div class="vignette absolute inset-0 z-10" aria-hidden="true"></div>

  <div class="hero-content relative z-20 mx-auto mb-20 mt-auto max-w-3xl px-6 text-center">


    <h1 class="mb-6 text-4xl font-extrabold leading-tight text-white md:text-6xl" style="text-shadow: 0 4px 24px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5)">
      Un alcalde con<br />pocas luces
    </h1>

    <p class="mb-10 text-lg leading-relaxed text-gray-100 md:text-xl" style="text-shadow: 0 2px 12px rgba(0,0,0,0.6)">
      Sacamos a la luz los cortes que la dejadez municipal esconde en los barrios humildes.
    </p>

    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-full bg-amber-400 px-8 py-3.5 text-base font-bold text-gray-900 shadow-lg shadow-amber-400/30 transition hover:bg-amber-300 hover:shadow-amber-400/50 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-gray-900"
      (click)="scrollToOutages()"
    >
      Ver cortes
      <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </button>
  </div>

  <span class="absolute bottom-3 right-4 z-20 select-none text-xs font-light text-white/30">
    María José López / Europa Press
  </span>
</section>
