spring:
  application:
    name: backend

  # H2 en memoria para desarrollo
  datasource:
    url: jdbc:h2:mem:pocasluces
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

server:
  port: 8080

logging:
  level:
    com.pocasluces: DEBUG
