spring:
  application:
    name: backend

  profiles:
    active: dev

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Europe/Madrid

# Set via environment variable ADMIN_API_KEY or override in profile-specific config.
# Endpoints protected: /api/outages/export/*
admin:
  api:
    key: ${ADMIN_API_KEY:}

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:pocasluces
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc:
          time_zone: Europe/Madrid

  flyway:
    enabled: false

  sql:
    init:
      mode: always

server:
  port: 8080

logging:
  level:
    com.pocasluces: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/sevillasinluz
    driver-class-name: org.postgresql.Driver
    username: sevillasinluz_user
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Europe/Madrid

  flyway:
    enabled: true
    baseline-on-migrate: true

  sql:
    init:
      mode: never

server:
  port: 8081

logging:
  level:
    com.pocasluces: INFO
